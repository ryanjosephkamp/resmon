name: Question
description: Ask a question about how resmon works or how to use it.
title: "[resmon] [Question] "
labels: ["question", "triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do, and what is unclear?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant configuration, prior steps, or documentation you have already consulted.
