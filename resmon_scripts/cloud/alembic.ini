# Alembic configuration for resmon-cloud.
#
# Run from the ``resmon_scripts/cloud/`` directory, e.g.::
#
#     cd resmon_scripts/cloud
#     DATABASE_URL=postgresql+psycopg://user:pw@host:5432/db alembic upgrade head
#
# The ``sqlalchemy.url`` setting below is intentionally empty because the
# real URL is read from ``DATABASE_URL`` inside ``migrations/env.py`` (12-factor
# per §7.2 of resmon_routines_and_accounts.md).

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url =
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
